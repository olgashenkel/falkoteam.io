<body>
  <site-header></site-header>


  <section class="section">
    <!-- Карусель "Факты о тхэквондо" -->
    <div class="carousel-wrapper">
      <div class="carousel-window">
        <button class="nav-btn prev" id="prevBtn">&#10094;</button>
        <button class="nav-btn next" id="nextBtn">&#10095;</button>
        <div class="carousel-dots" id="dotsContainer"></div>
        <div class="carousel-track" id="track"></div>
      </div>
    </div>

    <hr class="gradient-line">

    <!-- Новостной блок (вариант № 1) -->
    <div class="news">
      <h1>Информация о тхэквондо или новости (вариант № 1)</h1>
      <div class="news-grid" id="news-grid"></div>
    </div>



  </section>

  <!-- Кнопка Наверх -->
  <scroll-to-top></scroll-to-top>


  <site-footer></site-footer>
